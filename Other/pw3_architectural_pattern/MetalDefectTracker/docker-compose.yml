version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mdt
      POSTGRES_USER: mdt
      POSTGRES_PASSWORD: mdt_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdt -d mdt"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object store for images) ───────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_secret
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO web console (dev only)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + result backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --timeout 120
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://mdt:mdt_secret@db:5432/mdt
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret
      ML_SERVICE_URL: http://ml-service:8001
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --queues=default
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://mdt:mdt_secret@db:5432/mdt
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin_secret
      ML_SERVICE_URL: http://ml-service:8001
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── ML Inference Service (Quantum 2) ────────────────────────────────────────
  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODEL_PATH: /models/defect_detector.onnx
      MODEL_VERSION: "1.0.0"
      MIN_CONFIDENCE: "0.5"
    volumes:
      - ml_models:/models

  # ── Nginx reverse proxy + frontend SPA ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - ml-service

volumes:
  postgres_data:
  minio_data:
  ml_models:
  frontend_dist:
